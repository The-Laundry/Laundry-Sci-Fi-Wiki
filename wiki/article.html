<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article — Encyclopedia of Many Things</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/shell.css">
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<header id="app-header"></header>

<div id="layout">
  <nav id="sidebar"></nav>
  <main id="main">

    <div id="article-view">
      <div style="margin-bottom:28px;">
        <div id="view-category-tag" class="article-category-tag"></div>
        <h1 id="view-title" class="article-title"></h1>
        <div class="article-meta"><span id="view-meta-tags"></span></div>
      </div>
      <div class="article-layout">
        <div class="article-body-wrap">
          <div id="view-wikibox"></div>
          <div id="view-content" class="article-content clearfix"></div>

          <!-- Backlinks / cross-reference panel -->
          <div id="backlinks-panel" style="display:none; margin-top:32px;">
            <div class="backlinks-header" id="backlinks-toggle" onclick="toggleBacklinks()">
              <span class="backlinks-title">Referenced by</span>
              <span id="backlinks-count" class="backlinks-count"></span>
              <span id="backlinks-chevron" class="backlinks-chevron">▼</span>
            </div>
            <div id="backlinks-body" class="backlinks-body">
              <div id="backlinks-articles"></div>
              <div id="backlinks-events"></div>
            </div>
          </div>

          <div class="article-footer">
            <div id="view-tags" class="article-tags"></div>
            <div class="article-actions" id="article-edit-actions">
              <a id="edit-link" href="#" class="btn btn-secondary">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                Edit Article
              </a>
              <button class="btn btn-danger btn-sm" onclick="deleteArticle()">Delete</button>
            </div>
          </div>
        </div>
        <div id="toc-panel" style="display:none;">
          <div class="toc-inner">
            <div class="toc-label">Contents</div>
            <nav id="toc-nav"></nav>
          </div>
        </div>
      </div>
    </div>

    <div id="not-found" style="display:none;">
      <div class="empty-state">
        <p>Article not found.</p>
        <a href="index.html" class="btn btn-secondary" style="margin-top:16px;">← Go home</a>
      </div>
    </div>

  </main>
</div>

<script src="../assets/js/pat-shell.js"></script>
<script src="js/db.js"></script>
<script src="js/calendar.js"></script>
<script src="js/ui.js"></script>
<script src="js/ai.js"></script>
<script src="js/conlang.js"></script>
<script>
(async () => {
  await DB.init();
  UI.init({ activePage: '' });

  const params = new URLSearchParams(location.search);
  const artId  = params.get('id');

  // Check metadata first (fast) — if not found, 404
  const meta = DB.articleMeta.find(m => m.id === artId);
  if (!meta) {
    document.getElementById('article-view').style.display = 'none';
    document.getElementById('not-found').style.display = 'block';
    document.title = 'Not Found — Encyclopedia of Many Things';
    return;
  }

  // Load full article for content rendering
  const art = await DB.loadArticle(artId);
  if (!art) {
    document.getElementById('article-view').style.display = 'none';
    document.getElementById('not-found').style.display = 'block';
    document.title = 'Not Found — Encyclopedia of Many Things';
    return;
  }

  document.title = `${art.title || 'Untitled'} — Encyclopedia of Many Things`;
  document.getElementById('edit-link').href = `editor.html?id=${artId}`;
  if (DB.isReadOnly) document.getElementById('article-edit-actions').style.display = 'none';

  // Category breadcrumb
  document.getElementById('view-category-tag').textContent = DB.getCatPath(art.categoryId) || 'Uncategorized';
  document.getElementById('view-title').textContent = art.title || 'Untitled';

  // Tags
  document.getElementById('view-tags').innerHTML = (art.tags || []).map(t =>
    `<a href="search.html?tag=${encodeURIComponent(t)}" class="tag">${escHtml(t)}</a>`
  ).join('');
  document.getElementById('view-meta-tags').textContent = (art.tags || []).length ? 'Tags: ' + art.tags.join(', ') : '';

  // Wikibox
  const wbEl = document.getElementById('view-wikibox');
  if (art.wikibox && art.wikibox.enabled) {
    const wb     = art.wikibox;
    const hasImg = !!wb.image;

    // Build table rows, handling sections and fields
    let tableRows = '';
    let currentSectionId = null;
    (wb.fields || []).forEach((f, i) => {
      if (f.type === 'section') {
        const sid = `wbs_${i}`;
        tableRows += `<tr class="wb-section-header-row">
          <td colspan="2">
            <div class="wb-section-header-label" onclick="toggleWbSection('${sid}')">
              <span class="wb-sec-toggle" id="${sid}_tog">▼</span>
              ${escHtml(f.key || 'Section')}
            </div>
          </td>
        </tr>`;
        currentSectionId = sid;
      } else if (f.key || f.val) {
        const sectionClass = currentSectionId ? `wb-collapsible-row` : '';
        const sectionAttr  = currentSectionId ? `data-section="${currentSectionId}"` : '';
        const valHtml = f.val ? Conlang.parseHtml(processWikilinks(f.val)) : '';
        tableRows += `<tr class="${sectionClass}" ${sectionAttr}>
          <td>${escHtml(f.key || '')}</td>
          <td>${valHtml}</td>
        </tr>`;
      }
    });

    wbEl.innerHTML = `
      <div class="wikibox">
        <div class="wikibox-header${hasImg ? '' : ' no-image'}">${escHtml(wb.title || art.title || '')}</div>
        ${wb.subtitle ? `<div class="wikibox-subtitle">${escHtml(wb.subtitle)}</div>` : ''}
        ${hasImg ? `
          <div class="wikibox-image-wrap">
            <img class="wikibox-image" src="${wb.image}" alt="${escHtml(wb.title || '')}">
            ${wb.imgCaption ? `<div class="wikibox-img-caption">${escHtml(wb.imgCaption)}</div>` : ''}
          </div>` : ''}
        ${tableRows ? `<table class="wikibox-table">${tableRows}</table>` : ''}
      </div>`;
  }

  // Content
  const contentEl = document.getElementById('view-content');
  contentEl.innerHTML = processWikilinks(art.content || '');
  // Apply conlang {{Lang:word}} parser after wikilinks (it walks text nodes,
  // so it never touches existing <a> wikilinks or HTML attributes).
  Conlang.applyToElement(contentEl);
  Conlang.applyToElement(document.getElementById('view-wikibox'));
  buildTOC(contentEl);
  initSortableTables(contentEl);

  // Backlinks
  buildBacklinks(art);
})();

function processWikilinks(html) {
  return html.replace(/\[\[([^\]]+)\]\]/g, (m, inner) => {
    const pipeIdx = inner.indexOf('|');
    const name    = pipeIdx >= 0 ? inner.slice(0, pipeIdx).trim() : inner.trim();
    const display = pipeIdx >= 0 ? inner.slice(pipeIdx + 1).trim() : name;
    // articleMeta has titles — no full load needed for wikilink resolution
    const t = DB.articleMeta.find(a => a.title && a.title.toLowerCase() === name.toLowerCase());
    if (t) {
      return `<a href="article.html?id=${t.id}">${escHtml(display)}</a>`;
    }
    return `<a href="#" class="broken-link" data-broken-name="${escHtml(name)}" title="Click to create: ${escHtml(name)}">${escHtml(display)}</a>`;
  });
}

// Delegate clicks on any .broken-link in the article view / wikibox into the choice modal.
document.addEventListener('click', (e) => {
  const a = e.target.closest('a.broken-link');
  if (!a) return;
  const name = a.getAttribute('data-broken-name');
  if (!name) return;
  e.preventDefault();
  openBrokenLinkChoice(name);
});

// ── BROKEN LINK CHOICE MODAL ──────────────────────────────────────
function openBrokenLinkChoice(name) {
  const aiReady = (typeof AI !== 'undefined') && AI.isConfigured();
  const body = `
    <p style="font-size:14px;color:var(--text-muted);margin-bottom:16px;">
      The article <strong>${escHtml(name)}</strong> doesn't exist yet. How would you like to create it?
    </p>
    <div class="choice-grid">
      <button class="choice-card" id="choice-manual">
        <div class="choice-icon">✎</div>
        <div class="choice-title">Create Manually</div>
        <div class="choice-desc">Open a blank editor with this title pre-filled.</div>
      </button>
      <button class="choice-card" id="choice-ai" ${aiReady ? '' : 'disabled title="AI is not configured. Enable it in AI Settings."'}>
        <div class="choice-icon">✨</div>
        <div class="choice-title">Generate with AI</div>
        <div class="choice-desc">${aiReady ? 'Draft an article using context from your existing wiki.' : 'Configure AI Settings to enable this option.'}</div>
      </button>
    </div>`;
  UI.showModal('Create "' + name + '"', body, [
    { label: 'Cancel', cls: 'btn-secondary', action: () => UI.closeModal() },
  ]);
  document.getElementById('choice-manual').onclick = () => {
    UI.closeModal();
    location.href = 'editor.html?id=new&title=' + encodeURIComponent(name);
  };
  const aiBtn = document.getElementById('choice-ai');
  if (aiBtn && !aiBtn.disabled) aiBtn.onclick = () => { UI.closeModal(); openAIGenerateModal(name); };
}

// ── AI GENERATION (delegates to the dedicated ai-generate.html page) ────
// The old in-page modal has been replaced by a full-screen generator that
// supports Single / Batch / Timeline modes. We keep this entry point as a
// thin navigation shim so any legacy callers still work.
function openAIGenerateModal(prefillTitle, prefillSpec) {
  if (!AI.isConfigured()) {
    UI.toast('AI is not configured. See AI Settings.');
    return;
  }
  const title = (prefillSpec && prefillSpec.title) || prefillTitle || '';
  const params = new URLSearchParams();
  params.set('mode', 'single');
  if (title) params.set('title', title);
  try {
    const artId = new URLSearchParams(location.search).get('id');
    if (artId) params.set('returnTo', 'article.html?id=' + encodeURIComponent(artId));
  } catch (_e) {}
  location.href = 'ai-generate.html?' + params.toString();
}

// Expose globally for back-compat with any other page that may call into it.
window.openAIGenerateModal = openAIGenerateModal;

function toggleWbSection(sid) {
  const tog  = document.getElementById(sid + '_tog');
  const rows = document.querySelectorAll(`[data-section="${sid}"]`);
  const isCollapsed = tog && tog.classList.contains('collapsed');
  if (tog) tog.classList.toggle('collapsed', !isCollapsed);
  rows.forEach(r => r.style.display = isCollapsed ? '' : 'none');
}

function buildTOC(contentEl) {
  const nav = document.getElementById('toc-nav');
  nav.innerHTML = '';
  const headings = contentEl.querySelectorAll('h1,h2,h3');
  const panel = document.getElementById('toc-panel');
  panel.style.display = headings.length >= 2 ? 'block' : 'none';
  headings.forEach((h, i) => {
    h.id = 'hd' + i;
    const a = document.createElement('a');
    a.className = `toc-item toc-${h.tagName.toLowerCase()}`;
    a.textContent = h.textContent;
    a.onclick = () => {
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
      document.querySelectorAll('.toc-item').forEach(e => e.classList.remove('active'));
      a.classList.add('active');
    };
    nav.appendChild(a);
  });
}

function buildBacklinks(art) {
  // Scan articleMeta titles for wikilink references (fast, no file reads needed)
  // Full content scanning deferred to Phase 4 search index
  const titleLower = (art.title || '').toLowerCase();
  const wikiRe = /\[\[([^\]]+)\]\]/g;

  // Only scan articles that are already in cache (opened this session)
  // For uncached articles, we can only check if their cached content mentions this title
  const mentioningArts = [];
  for (const meta of DB.articleMeta) {
    if (meta.id === art.id) continue;
    const cached = DB.articleCache[meta.id];
    if (!cached) continue; // skip uncached — avoids loading all articles
    const html = (cached.content || '') + (cached.wikibox?.fields?.map(f => f.val || '').join(' ') || '');
    wikiRe.lastIndex = 0;
    let m;
    let found = false;
    while ((m = wikiRe.exec(html)) !== null) {
      const inner = m[1];
      const name  = inner.includes('|') ? inner.slice(0, inner.indexOf('|')).trim() : inner.trim();
      if (name.toLowerCase() === titleLower) { found = true; break; }
    }
    if (found) mentioningArts.push(meta);
  }

  // Timeline events linked to this article (always fast — events always loaded)
  const linkedEvents = DB.events.filter(ev => ev.articleId === art.id);

  const total = mentioningArts.length + linkedEvents.length;
  if (!total) return;

  document.getElementById('backlinks-panel').style.display = 'block';
  document.getElementById('backlinks-count').textContent = total;

  // Articles sub-list
  const artEl = document.getElementById('backlinks-articles');
  if (mentioningArts.length) {
    artEl.innerHTML = `<div class="backlinks-sub-label">Mentioned in articles</div>` +
      mentioningArts.map(a => `
        <a class="backlink-item" href="article.html?id=${a.id}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;opacity:.5;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span class="backlink-title">${escHtml(a.title || 'Untitled')}</span>
          <span class="backlink-cat">${escHtml(DB.getCatPath(a.categoryId) || 'Uncategorized')}</span>
        </a>`).join('');
  }

  // Events sub-list
  const evEl = document.getElementById('backlinks-events');
  if (linkedEvents.length) {
    evEl.innerHTML = `<div class="backlinks-sub-label" style="margin-top:${mentioningArts.length ? 12 : 0}px;">Related timeline events</div>` +
      linkedEvents.map(ev => {
        const tl = DB.timelines.find(t => (ev.timelineIds || []).includes(t.id));
        return `
          <a class="backlink-item" href="timeline.html${tl ? '?id=' + tl.id : ''}">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;opacity:.5;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span class="backlink-title">${escHtml(ev.title || 'Untitled Event')}</span>
            <span class="backlink-cat">${escHtml(tl ? tl.name : 'Timeline')}</span>
          </a>`;
      }).join('');
  }
}

function toggleBacklinks() {
  const body    = document.getElementById('backlinks-body');
  const chevron = document.getElementById('backlinks-chevron');
  const open    = body.style.display !== 'none';
  body.style.display    = open ? 'none' : 'block';
  chevron.style.transform = open ? 'rotate(-90deg)' : '';
}

async function deleteArticle() {
  const params = new URLSearchParams(location.search);
  const artId  = params.get('id');
  const meta   = DB.articleMeta.find(m => m.id === artId);
  if (!confirm(`Delete "${meta?.title || 'this article'}"? This cannot be undone.`)) return;
  // deleteArticleFile now removes from meta, cache, and updates index.json
  await DB.deleteArticleFile(artId);
  UI.toast('Article deleted.');
  location.href = 'index.html';
}

function initSortableTables(contentEl) {
  contentEl.querySelectorAll('table.wiki-table.sortable').forEach(table => {
    const thead = table.querySelector('thead');
    const tbody = table.querySelector('tbody');
    if (!thead || !tbody) return;

    const hasRowNums = table.classList.contains('show-row-nums');
    let sortState = { col: -1, dir: 1 };

    thead.querySelectorAll('th').forEach((th, thIdx) => {
      if (th.dataset.nosort || th.classList.contains('row-num-col')) return;

      th.addEventListener('click', () => {
        // Cycle asc → desc → asc
        if (sortState.col === thIdx) {
          sortState.dir = sortState.dir === 1 ? -1 : 1;
        } else {
          sortState.col = thIdx;
          sortState.dir = 1;
        }

        thead.querySelectorAll('th').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
        th.classList.add(sortState.dir === 1 ? 'sort-asc' : 'sort-desc');

        // The cell index in <tr> equals thIdx (row-num col is th[0], data cols follow)
        const rows = [...tbody.querySelectorAll('tr')];
        rows.sort((a, b) => {
          const aText = a.cells[thIdx]?.textContent.trim() || '';
          const bText = b.cells[thIdx]?.textContent.trim() || '';
          const aNum  = parseFloat(aText.replace(/[^-\d.]/g, ''));
          const bNum  = parseFloat(bText.replace(/[^-\d.]/g, ''));
          if (!isNaN(aNum) && !isNaN(bNum)) return sortState.dir * (aNum - bNum);
          return sortState.dir * aText.localeCompare(bText);
        });

        // Re-append sorted rows and refresh row-num labels if present
        rows.forEach((row, i) => {
          tbody.appendChild(row);
          if (hasRowNums) {
            const rnCell = row.querySelector('td.row-num-col');
            if (rnCell) rnCell.textContent = i + 1;
          }
        });
      });
    });
  });
}
</script>
</body>
</html>
