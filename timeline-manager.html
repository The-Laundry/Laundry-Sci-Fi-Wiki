<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline Manager — Encyclopedia of Many Things</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<header id="app-header"></header>

<div id="layout">
  <nav id="sidebar"></nav>
  <main id="main">

    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap;">
      <div>
        <h1 class="page-title">Timeline Manager</h1>
        <p class="page-subtitle">Create and manage your world's timelines, event categories, and eras.</p>
      </div>
      <button class="btn btn-primary" onclick="openTimelineModal(null)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Timeline
      </button>
    </div>

    <div class="tl-manager-grid" id="tl-manager-grid"></div>

    <!-- Event Categories -->
    <div style="margin-top:8px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div>
          <h2 style="font-family:var(--font-display);font-size:20px;color:var(--text);margin-bottom:2px;">Event Categories</h2>
          <p style="color:var(--text-muted);font-size:13px;">Coloured labels assigned to events across all timelines.</p>
        </div>
        <button class="btn btn-secondary" onclick="openEventCatModal(null)">+ New Category</button>
      </div>
      <div id="event-cat-list" style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);min-height:60px;"></div>
    </div>

    <!-- Importance Colors -->
    <div style="margin-top:32px;">
      <div style="margin-bottom:14px;">
        <h2 style="font-family:var(--font-display);font-size:20px;color:var(--text);margin-bottom:2px;">Importance Level Colors</h2>
        <p style="color:var(--text-muted);font-size:13px;">Customize the icon and border color for each importance level. Applies across all timelines.</p>
      </div>
      <div id="imp-color-list" style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;"></div>
    </div>

  </main>
</div>

<script src="js/db.js"></script>
<script src="js/calendar.js"></script>
<script src="js/ui.js"></script>
<script src="js/ai.js"></script>
<script>
const EVENT_CAT_COLORS = ['#3a6ea8','#a84e6e','#4ea87b','#7b4ea8','#a87b4e','#4e8ea8','#a84e4e','#6ea84e','#e09020','#20a0a0'];

const IMP_ORDER   = ['insignificant','trivial','minor','notable','major','milestone'];
const IMP_LABELS  = {insignificant:'Insignificant',trivial:'Trivial',minor:'Minor',notable:'Notable',major:'Major',milestone:'Milestone'};
const IMP_DEFAULTS = {insignificant:'#9e9e9e',trivial:'#78909c',minor:'#26a69a',notable:'#3a6ea8',major:'#7b4ea8',milestone:'#c07020'};

function getImpColor(imp) {
  return (DB.settings.importanceColors||{})[imp] || IMP_DEFAULTS[imp] || '#3a6ea8';
}

// SVG shapes (same as timeline.html)
function impIconSVG(imp, color, size=14) {
  const shapes={insignificant:`<circle cx="8" cy="8" r="4" fill="${color}"/>`,trivial:`<circle cx="8" cy="8" r="5.5" fill="${color}"/>`,minor:`<rect x="3" y="3" width="10" height="10" rx="2" fill="${color}"/>`,notable:`<polygon points="8,2 14,14 2,14" fill="${color}"/>`,major:`<polygon points="8,1 10.5,6.5 16,7 11.5,11 13,16.5 8,13.5 3,16.5 4.5,11 0,7 5.5,6.5" fill="${color}"/>`,milestone:`<polygon points="8,1 9.8,6.2 15.5,6.2 10.8,9.5 12.6,14.8 8,11.5 3.4,14.8 5.2,9.5 0.5,6.2 6.2,6.2" fill="${color}"/>`};
  return `<svg width="${size}" height="${size}" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">${shapes[imp]||shapes.notable}</svg>`;
}

(async () => {
  await DB.init();
  if (DB.isReadOnly) { location.replace('index.html'); return; }
  UI.init({ activePage: 'timelines' });
  renderTimelineManager();
  renderEventCatList();
  renderImpColorList();
})();

// ── TIMELINE CARDS ────────────────────────────────────────────────

function renderTimelineManager() {
  const grid = document.getElementById('tl-manager-grid');
  grid.innerHTML = '';
  if (!DB.timelines.length) {
    grid.innerHTML = '<div class="empty-state" style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);grid-column:1/-1;">No timelines yet. Create one to get started.</div>';
    return;
  }
  DB.timelines.forEach(tl => {
    const evCount  = DB.events.filter(e => e.timelineIds && e.timelineIds.includes(tl.id)).length;
    const eraCount = DB.eras.filter(e => e.timelineId === tl.id).length;
    const card = document.createElement('div');
    card.className = 'tl-card';
    card.innerHTML = `
      <div class="tl-card-name">${escHtml(tl.name)}</div>
      <div class="tl-card-desc">${escHtml(tl.description || 'No description.')}</div>
      <div class="tl-card-meta">
        <span>${evCount} event${evCount !== 1 ? 's' : ''}</span>
        <span>${eraCount} era${eraCount !== 1 ? 's' : ''}</span>
      </div>
      <div class="tl-card-actions">
        <a href="timeline.html?id=${tl.id}" class="btn btn-primary btn-sm">View</a>
        <button class="btn btn-secondary btn-sm" onclick="openTimelineModal('${tl.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTimeline('${tl.id}')">Delete</button>
      </div>`;
    grid.appendChild(card);
  });
}

function openTimelineModal(id) {
  const tl  = id ? DB.timelines.find(t => t.id === id) : null;
  const cal = CALENDARS[DB.settings.activeCalendar || 'hcc'];
  UI.showModal(tl ? 'Edit Timeline' : 'New Timeline', `
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="field-row"><div class="field-label">Name *</div><input id="tl-name" class="field-input" value="${escHtml(tl?.name || '')}" placeholder="e.g. Main History"></div>
      <div class="field-row"><div class="field-label">Description</div><textarea id="tl-desc" class="field-input" rows="2" style="resize:vertical;">${escHtml(tl?.description || '')}</textarea></div>
      <div style="border-top:1px solid var(--border-light);padding-top:12px;">
        <div class="field-label" style="margin-bottom:8px;">Optional Date Range Override (${cal.posEra} years)</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div class="field-row"><div class="field-label">Start Year</div><input id="tl-start" type="number" class="field-input" value="${tl?.startYear ?? ''}" placeholder="Earliest year"></div>
          <div class="field-row"><div class="field-label">End Year</div><input id="tl-end" type="number" class="field-input" value="${tl?.endYear ?? ''}" placeholder="Latest year"></div>
        </div>
        <div style="font-size:12px;color:var(--text-faint);margin-top:6px;">Enter in ${cal.posEra} years. Leave blank to auto-fit to events.</div>
      </div>
    </div>`,
    [{ label: 'Cancel', cls: 'btn-secondary', action: () => UI.closeModal() },
     { label: tl ? 'Save Changes' : 'Create Timeline', cls: 'btn-primary', action: async () => {
        const name = document.getElementById('tl-name').value.trim();
        if (!name) { UI.toast('Please enter a name.'); return; }
        const startRaw = document.getElementById('tl-start').value.trim();
        const endRaw   = document.getElementById('tl-end').value.trim();
        const calKey   = DB.settings.activeCalendar || 'hcc';
        const startYear = startRaw !== '' ? calendarToCE(startRaw, cal.posEra, calKey) : null;
        const endYear   = endRaw   !== '' ? calendarToCE(endRaw,   cal.posEra, calKey) : null;
        const description = document.getElementById('tl-desc').value.trim();
        if (tl) { Object.assign(tl, { name, description, startYear, endYear }); }
        else { DB.timelines.push({ id: mkId('tl'), name, description, startYear, endYear, created: Date.now() }); }
        await DB.save(); UI.closeModal(); UI.renderSidebar(); renderTimelineManager(); UI.toast(tl ? 'Timeline updated.' : 'Timeline created.');
     }}]
  );
  setTimeout(() => document.getElementById('tl-name')?.focus(), 50);
}

async function deleteTimeline(id) {
  const tl = DB.timelines.find(t => t.id === id);
  if (!confirm(`Delete timeline "${tl?.name}"?\n\nEvents won't be deleted but will be removed from this timeline.`)) return;
  DB.events.forEach(e => { if (e.timelineIds) e.timelineIds = e.timelineIds.filter(x => x !== id); });
  DB.eras     = DB.eras.filter(e => e.timelineId !== id);
  DB.timelines = DB.timelines.filter(t => t.id !== id);
  await DB.save(); UI.renderSidebar(); renderTimelineManager(); UI.toast('Timeline deleted.');
}

// ── EVENT CATEGORIES ──────────────────────────────────────────────

function renderEventCatList() {
  const list = document.getElementById('event-cat-list');
  if (!DB.timelineCategories.length) {
    list.innerHTML = '<div class="empty-state" style="padding:24px;">No event categories yet.</div>'; return;
  }
  list.innerHTML = '';
  DB.timelineCategories.forEach(cat => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border-light);';
    row.innerHTML = `
      <div style="width:14px;height:14px;border-radius:50%;background:${cat.color || '#aaa'};flex-shrink:0;"></div>
      <span style="flex:1;font-weight:500;font-size:14px;">${escHtml(cat.name)}</span>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-ghost btn-xs" onclick="openEventCatModal('${cat.id}')">Edit</button>
        <button class="btn btn-danger btn-xs" onclick="deleteEventCat('${cat.id}')">Delete</button>
      </div>`;
    list.appendChild(row);
  });
}

function openEventCatModal(id) {
  const cat = id ? DB.timelineCategories.find(c => c.id === id) : null;
  let catPickerColor = cat?.color || EVENT_CAT_COLORS[0];
  let defPickerColor = cat?.defaultColor || '';

  UI.showModal(cat ? 'Edit Event Category' : 'New Event Category', `
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="field-row"><div class="field-label">Name *</div><input id="ec-name" class="field-input" value="${escHtml(cat?.name || '')}" placeholder="e.g. Political, Military"></div>
      <div class="field-row">
        <div class="field-label">Category Color <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px;color:var(--text-faint);">(badge color)</span></div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div id="ec-cs" style="width:28px;height:28px;border-radius:var(--radius);background:${catPickerColor};border:1px solid var(--border);cursor:pointer;flex-shrink:0;" onclick="openColorPicker(this,'${catPickerColor}',c=>{catPickerColor=c;document.getElementById('ec-cs').style.background=c;document.getElementById('ec-cv').value=c;})"></div>
          <span style="font-size:12px;color:var(--text-muted);">Click to choose</span>
          <input id="ec-cv" type="hidden" value="${catPickerColor}">
        </div>
      </div>
      <div class="field-row">
        <div class="field-label">Default Event Color <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px;color:var(--text-faint);">(applied to events in this category if no per-event color set)</span></div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div id="ec-ds" style="width:28px;height:28px;border-radius:var(--radius);background:${defPickerColor||'var(--bg-sidebar)'};border:1px solid var(--border);cursor:pointer;flex-shrink:0;${defPickerColor?'':'opacity:.5;'}" onclick="openColorPicker(this,document.getElementById('ec-dv').value||'#3a6ea8',c=>{defPickerColor=c;document.getElementById('ec-ds').style.background=c;document.getElementById('ec-ds').style.opacity='1';document.getElementById('ec-dv').value=c;})"></div>
          <span style="font-size:12px;color:var(--text-muted);">Click to set</span>
          <button type="button" class="btn btn-ghost btn-xs" onclick="defPickerColor='';document.getElementById('ec-dv').value='';document.getElementById('ec-ds').style.background='var(--bg-sidebar)';document.getElementById('ec-ds').style.opacity='.5';">Clear</button>
          <input id="ec-dv" type="hidden" value="${cat?.defaultColor||''}">
        </div>
      </div>
    </div>`,
    [{ label: 'Cancel', cls: 'btn-secondary', action: () => UI.closeModal() },
     { label: cat ? 'Save' : 'Create', cls: 'btn-primary', action: async () => {
        const name  = document.getElementById('ec-name').value.trim();
        if (!name) { UI.toast('Enter a name.'); return; }
        const color = document.getElementById('ec-cv').value || EVENT_CAT_COLORS[0];
        const defaultColor = document.getElementById('ec-dv').value || null;
        if (cat) { cat.name = name; cat.color = color; cat.defaultColor = defaultColor; }
        else DB.timelineCategories.push({ id: mkId('ec'), name, color, defaultColor });
        await DB.save(); UI.closeModal(); renderEventCatList(); UI.toast(cat ? 'Category updated.' : 'Category created.');
     }}]
  );
  setTimeout(() => document.getElementById('ec-name')?.focus(), 50);
}

window.pickECColor = c => {
  document.getElementById('ec-color').value = c;
  document.querySelectorAll('#ec-swatches > div').forEach(d => {
    d.style.border = d.style.background === c ? '3px solid var(--text)' : '3px solid transparent';
  });
};

async function deleteEventCat(id) {
  if (!confirm('Delete this event category? Events using it will become uncategorized.')) return;
  DB.events.forEach(e => { if (e.eventCategoryId === id) e.eventCategoryId = null; });
  DB.timelineCategories = DB.timelineCategories.filter(c => c.id !== id);
  await DB.save(); renderEventCatList(); UI.toast('Category deleted.');
}

// ── IMPORTANCE COLORS ─────────────────────────────────────────────

function renderImpColorList() {
  const list = document.getElementById('imp-color-list');
  if (!list) return;
  if (!DB.settings.importanceColors) DB.settings.importanceColors = {};
  list.innerHTML = '';
  IMP_ORDER.forEach((imp, i) => {
    const color = getImpColor(imp);
    const row = document.createElement('div');
    row.style.cssText = `display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:${i<IMP_ORDER.length-1?'1px solid var(--border-light)':'none'};`;
    row.innerHTML = `
      <span style="display:flex;align-items:center;">${impIconSVG(imp, color, 16)}</span>
      <span style="flex:1;font-weight:500;font-size:14px;">${IMP_LABELS[imp]}</span>
      <div id="imp-preview-${imp}" style="width:24px;height:24px;border-radius:4px;background:${color};border:1px solid var(--border);cursor:pointer;flex-shrink:0;" onclick="openImpColorPicker('${imp}',this)"></div>
      <span style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted);min-width:64px;" id="imp-hex-${imp}">${color}</span>
      <button class="btn btn-ghost btn-sm" onclick="resetImpColor('${imp}')">Reset</button>`;
    list.appendChild(row);
  });
}

function openImpColorPicker(imp, anchorEl) {
  const current = getImpColor(imp);
  openColorPicker(anchorEl, current, async color => {
    if (!DB.settings.importanceColors) DB.settings.importanceColors = {};
    DB.settings.importanceColors[imp] = color;
    const preview = document.getElementById(`imp-preview-${imp}`);
    const hexEl   = document.getElementById(`imp-hex-${imp}`);
    if (preview) preview.style.background = color;
    if (hexEl)   hexEl.textContent = color;
    await DB.save();
    // Re-render the icon with new color
    const iconEl = preview?.parentElement?.querySelector('svg');
    if (iconEl) iconEl.outerHTML = impIconSVG(imp, color, 16);
  });
}

async function resetImpColor(imp) {
  if (!DB.settings.importanceColors) DB.settings.importanceColors = {};
  delete DB.settings.importanceColors[imp];
  await DB.save();
  renderImpColorList();
  UI.toast(`${IMP_LABELS[imp]} color reset to default.`);
}

// ── COLOR PICKER ──────────────────────────────────────────────────

const CP_SWATCHES = ['#3a6ea8','#a84e6e','#4ea87b','#7b4ea8','#a87b4e','#4e8ea8','#a84e4e','#6ea84e','#c07020','#20a090','#e05050','#50a0e0','#a0a020','#e08020','#9e9e9e','#78909c','#26a69a','#ffffff','#888888','#000000'];
let _cpCallback = null;

function openColorPicker(anchorEl, currentColor, onChange) {
  document.getElementById('g-cp')?.remove();
  _cpCallback = onChange;
  const pop = document.createElement('div');
  pop.id = 'g-cp';
  pop.className = 'color-picker-popover open';
  pop.innerHTML = `
    <div class="cp-preview" id="cp-prev" style="background:${currentColor};"></div>
    <div class="cp-swatches">${CP_SWATCHES.map(s=>`<div class="cp-swatch${s===currentColor?' selected':''}" style="background:${s};" onclick="cpPick('${s}')"></div>`).join('')}</div>
    <div class="cp-inputs">
      <div class="cp-row"><label>Hex</label><input id="cp-hex" type="text" value="${currentColor}" maxlength="7" oninput="cpHex(this.value)"></div>
      <div class="cp-row"><label>R</label><input id="cp-r" type="number" min="0" max="255" value="${htr(currentColor).r}" oninput="cpRgb()"></div>
      <div class="cp-row"><label>G</label><input id="cp-g" type="number" min="0" max="255" value="${htr(currentColor).g}" oninput="cpRgb()"></div>
      <div class="cp-row"><label>B</label><input id="cp-b" type="number" min="0" max="255" value="${htr(currentColor).b}" oninput="cpRgb()"></div>
    </div>`;
  document.body.appendChild(pop);
  const rect = anchorEl.getBoundingClientRect();
  pop.style.cssText = `position:fixed;top:${rect.bottom+6}px;left:${Math.min(rect.left,window.innerWidth-240)}px;z-index:9999;`;
  setTimeout(() => document.addEventListener('click', cpClose), 50);
}
function cpClose(e) {
  const pop = document.getElementById('g-cp');
  if (pop && !pop.contains(e.target)) { pop.remove(); document.removeEventListener('click', cpClose); }
}
window.cpPick = c => cpSet(c);
window.cpHex  = v => { if (/^#[0-9a-fA-F]{6}$/.test(v)) cpSet(v); };
window.cpRgb  = () => {
  const r=Math.min(255,Math.max(0,parseInt(document.getElementById('cp-r')?.value)||0));
  const g=Math.min(255,Math.max(0,parseInt(document.getElementById('cp-g')?.value)||0));
  const b=Math.min(255,Math.max(0,parseInt(document.getElementById('cp-b')?.value)||0));
  cpSet(rth(r,g,b));
};
function cpSet(hex) {
  const pop=document.getElementById('g-cp'); if(!pop)return;
  pop.querySelector('#cp-prev').style.background=hex;
  pop.querySelector('#cp-hex').value=hex;
  const {r,g,b}=htr(hex);
  pop.querySelector('#cp-r').value=r; pop.querySelector('#cp-g').value=g; pop.querySelector('#cp-b').value=b;
  pop.querySelectorAll('.cp-swatch').forEach(s=>s.classList.toggle('selected',s.style.backgroundColor===hex||s.style.background===hex));
  if(_cpCallback)_cpCallback(hex);
}
function htr(hex){const r=parseInt(hex.slice(1,3),16)||0,g=parseInt(hex.slice(3,5),16)||0,b=parseInt(hex.slice(5,7),16)||0;return{r,g,b};}
function rth(r,g,b){return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
</script>
</body>
</html>
