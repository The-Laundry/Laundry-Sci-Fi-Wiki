<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article — Encyclopedia of Many Things</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<header id="app-header"></header>

<div id="layout">
  <nav id="sidebar"></nav>
  <main id="main">

    <div id="article-view">
      <div style="margin-bottom:28px;">
        <div id="view-category-tag" class="article-category-tag"></div>
        <h1 id="view-title" class="article-title"></h1>
        <div class="article-meta"><span id="view-meta-tags"></span></div>
      </div>
      <div class="article-layout">
        <div class="article-body-wrap">
          <div id="view-wikibox"></div>
          <div id="view-content" class="article-content clearfix"></div>
          <div class="article-footer">
            <div id="view-tags" class="article-tags"></div>
            <div class="article-actions" id="article-edit-actions">
              <a id="edit-link" href="#" class="btn btn-secondary">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                Edit Article
              </a>
              <button class="btn btn-danger btn-sm" onclick="deleteArticle()">Delete</button>
            </div>
          </div>
        </div>
        <div id="toc-panel" style="display:none;">
          <div class="toc-inner">
            <div class="toc-label">Contents</div>
            <nav id="toc-nav"></nav>
          </div>
        </div>
      </div>
    </div>

    <div id="not-found" style="display:none;">
      <div class="empty-state">
        <p>Article not found.</p>
        <a href="index.html" class="btn btn-secondary" style="margin-top:16px;">← Go home</a>
      </div>
    </div>

  </main>
</div>

<script src="js/db.js"></script>
<script src="js/calendar.js"></script>
<script src="js/ui.js"></script>
<script src="js/ai.js"></script>
<script>
(async () => {
  await DB.init();
  UI.init({ activePage: '' });

  const params = new URLSearchParams(location.search);
  const artId = params.get('id');
  const art = DB.articles.find(a => a.id === artId);

  if (!art) {
    document.getElementById('article-view').style.display = 'none';
    document.getElementById('not-found').style.display = 'block';
    document.title = 'Not Found — Encyclopedia of Many Things';
    return;
  }

  document.title = `${art.title || 'Untitled'} — Encyclopedia of Many Things`;
  document.getElementById('edit-link').href = `editor.html?id=${artId}`;
  if (DB.isReadOnly) document.getElementById('article-edit-actions').style.display = 'none';

  // Category breadcrumb
  document.getElementById('view-category-tag').textContent = DB.getCatPath(art.categoryId) || 'Uncategorized';
  document.getElementById('view-title').textContent = art.title || 'Untitled';

  // Tags
  document.getElementById('view-tags').innerHTML = (art.tags || []).map(t => `<span class="tag">${escHtml(t)}</span>`).join('');
  document.getElementById('view-meta-tags').textContent = (art.tags || []).length ? 'Tags: ' + art.tags.join(', ') : '';

  // Wikibox
  const wbEl = document.getElementById('view-wikibox');
  if (art.wikibox && art.wikibox.enabled) {
    const wb     = art.wikibox;
    const hasImg = !!wb.image;

    // Build table rows, handling sections and fields
    let tableRows = '';
    let currentSectionId = null;
    (wb.fields || []).forEach((f, i) => {
      if (f.type === 'section') {
        const sid = `wbs_${i}`;
        tableRows += `<tr class="wb-section-header-row">
          <td colspan="2">
            <div class="wb-section-header-label" onclick="toggleWbSection('${sid}')">
              <span class="wb-sec-toggle" id="${sid}_tog">▼</span>
              ${escHtml(f.key || 'Section')}
            </div>
          </td>
        </tr>`;
        currentSectionId = sid;
      } else if (f.key || f.val) {
        const sectionClass = currentSectionId ? `wb-collapsible-row` : '';
        const sectionAttr  = currentSectionId ? `data-section="${currentSectionId}"` : '';
        const valHtml = f.val ? processWikilinks(f.val) : '';
        tableRows += `<tr class="${sectionClass}" ${sectionAttr}>
          <td>${escHtml(f.key || '')}</td>
          <td>${valHtml}</td>
        </tr>`;
      }
    });

    wbEl.innerHTML = `
      <div class="wikibox">
        <div class="wikibox-header${hasImg ? '' : ' no-image'}">${escHtml(wb.title || art.title || '')}</div>
        ${wb.subtitle ? `<div class="wikibox-subtitle">${escHtml(wb.subtitle)}</div>` : ''}
        ${hasImg ? `
          <div class="wikibox-image-wrap">
            <img class="wikibox-image" src="${wb.image}" alt="${escHtml(wb.title || '')}">
            ${wb.imgCaption ? `<div class="wikibox-img-caption">${escHtml(wb.imgCaption)}</div>` : ''}
          </div>` : ''}
        ${tableRows ? `<table class="wikibox-table">${tableRows}</table>` : ''}
      </div>`;
  }

  // Content
  const contentEl = document.getElementById('view-content');
  contentEl.innerHTML = processWikilinks(art.content || '');
  buildTOC(contentEl);
})();

function processWikilinks(html) {
  return html.replace(/\[\[([^\]]+)\]\]/g, (m, inner) => {
    // Support [[Article Name|Display Text]] syntax
    const pipeIdx = inner.indexOf('|');
    const name    = pipeIdx >= 0 ? inner.slice(0, pipeIdx).trim() : inner.trim();
    const display = pipeIdx >= 0 ? inner.slice(pipeIdx + 1).trim() : name;
    const t = DB.articles.find(a => a.title && a.title.toLowerCase() === name.toLowerCase());
    if (t) {
      return `<a href="article.html?id=${t.id}">${escHtml(display)}</a>`;
    }
    // Broken link: intercept clicks so the user can pick manual-create vs AI-generate.
    return `<a href="#" class="broken-link" data-broken-name="${escHtml(name)}" title="Click to create: ${escHtml(name)}">${escHtml(display)}</a>`;
  });
}

// Delegate clicks on any .broken-link in the article view / wikibox into the choice modal.
document.addEventListener('click', (e) => {
  const a = e.target.closest('a.broken-link');
  if (!a) return;
  const name = a.getAttribute('data-broken-name');
  if (!name) return;
  e.preventDefault();
  openBrokenLinkChoice(name);
});

// ── BROKEN LINK CHOICE MODAL ──────────────────────────────────────
function openBrokenLinkChoice(name) {
  const aiReady = (typeof AI !== 'undefined') && AI.isConfigured();
  const body = `
    <p style="font-size:14px;color:var(--text-muted);margin-bottom:16px;">
      The article <strong>${escHtml(name)}</strong> doesn't exist yet. How would you like to create it?
    </p>
    <div class="choice-grid">
      <button class="choice-card" id="choice-manual">
        <div class="choice-icon">✎</div>
        <div class="choice-title">Create Manually</div>
        <div class="choice-desc">Open a blank editor with this title pre-filled.</div>
      </button>
      <button class="choice-card" id="choice-ai" ${aiReady ? '' : 'disabled title="AI is not configured. Enable it in Data → AI."'}>
        <div class="choice-icon">✨</div>
        <div class="choice-title">Generate with AI</div>
        <div class="choice-desc">${aiReady ? 'Draft an article using context from your existing wiki.' : 'Configure AI in Data to enable this option.'}</div>
      </button>
    </div>`;
  UI.showModal('Create "' + name + '"', body, [
    { label: 'Cancel', cls: 'btn-secondary', action: () => UI.closeModal() },
  ]);
  document.getElementById('choice-manual').onclick = () => {
    UI.closeModal();
    location.href = 'editor.html?id=new&title=' + encodeURIComponent(name);
  };
  const aiBtn = document.getElementById('choice-ai');
  if (aiBtn && !aiBtn.disabled) aiBtn.onclick = () => { UI.closeModal(); openAIGenerateModal(name); };
}

// ── AI GENERATION MODAL ───────────────────────────────────────────
function openAIGenerateModal(prefillTitle, prefillSpec) {
  if (!AI.isConfigured()) {
    UI.toast('AI is not configured. See Data → AI (Infinite Wiki).');
    return;
  }
  const spec = prefillSpec || { title: prefillTitle || '', guidance: '', templateId: '', relatedIds: [] };

  const templateOptions = ['<option value="">— No template (generic) —</option>']
    .concat(DB.articleTemplates.map(t =>
      `<option value="${t.id}" ${t.id === spec.templateId ? 'selected' : ''}>${escHtml(t.name)}</option>`
    )).join('');

  const body = `
    <div class="ai-gen-form">
      <div class="ai-form-row">
        <label>Article Title</label>
        <input type="text" id="aig-title" class="field-input" value="${escHtml(spec.title || '')}" placeholder="e.g. Admiral Veya Solis">
      </div>

      <div class="ai-form-row">
        <label>Template</label>
        <select id="aig-template" class="field-input">${templateOptions}</select>
        <div class="ai-hint">Gives the AI a structural hint and, optionally, a wikibox to fill. Manage on the <a href="article-templates.html" target="_blank">Article Templates</a> page.</div>
      </div>

      <div class="ai-form-row">
        <label>Additional Guidance <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-faint);font-size:11px;">(optional)</span></label>
        <textarea id="aig-guidance" class="field-input" placeholder="Key facts, tone, era, relationships, anything you want the AI to know…">${escHtml(spec.guidance || '')}</textarea>
      </div>

      <div class="ai-form-row">
        <label>Related Articles <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-faint);font-size:11px;">(optional — auto-retrieval will fill in the rest)</span></label>
        <div id="aig-related-chips" class="chips-row"></div>
        <input type="text" id="aig-related-search" class="field-input" placeholder="Search existing articles…" autocomplete="off">
        <div id="aig-related-results" class="aig-results" style="display:none;"></div>
      </div>

      <div id="aig-progress" class="ai-progress-wrap" style="display:none;">
        <div class="ai-progress-bar"><div class="ai-progress-fill indeterminate"></div></div>
        <div id="aig-phase" class="ai-phase-line"><span class="ai-spinner"></span><span id="aig-phase-text">Working…</span></div>
      </div>

      <div id="aig-context" class="ai-ctx-wrap" style="display:none;"></div>

      <div id="aig-stream-wrap" class="ai-stream-wrap" style="display:none;">
        <div class="ai-stream-head">
          <div class="ai-stream-title">
            <span class="ai-spinner sm" id="aig-stream-spin"></span>
            <span id="aig-stream-title-text">Writing article…</span>
          </div>
          <div class="ai-stream-count"><span id="aig-stream-count">0</span> chars</div>
        </div>
        <div id="aig-stream-summary" class="ai-stream-summary" style="display:none;"></div>
        <div id="aig-stream-preview" class="ai-stream-preview empty"></div>
      </div>
    </div>
  `;

  UI.showModal('Generate with AI', body, [
    { label: 'Generate', cls: 'btn-primary', action: runGenerate },
    { label: 'Cancel',   cls: 'btn-secondary', action: () => UI.closeModal() },
  ]);

  // Wire up the related-articles picker
  const chips = spec.relatedIds ? spec.relatedIds.slice() : [];
  const chipsEl = document.getElementById('aig-related-chips');
  const searchEl = document.getElementById('aig-related-search');
  const resultsEl = document.getElementById('aig-related-results');

  function renderChips() {
    chipsEl.innerHTML = chips.map(id => {
      const a = DB.articles.find(x => x.id === id);
      if (!a) return '';
      return `<span class="chip" data-id="${a.id}">${escHtml(a.title || 'Untitled')} <button type="button" class="chip-x" data-rm="${a.id}" title="Remove">✕</button></span>`;
    }).join('');
  }
  chipsEl.onclick = (e) => {
    const rm = e.target.getAttribute('data-rm');
    if (!rm) return;
    const i = chips.indexOf(rm);
    if (i >= 0) chips.splice(i, 1);
    renderChips();
  };
  renderChips();

  searchEl.oninput = () => {
    const q = searchEl.value.trim().toLowerCase();
    if (!q) { resultsEl.style.display = 'none'; resultsEl.innerHTML = ''; return; }
    const matches = DB.articles
      .filter(a => !chips.includes(a.id))
      .filter(a => (a.title || '').toLowerCase().includes(q) ||
                   (a.tags || []).some(t => t.toLowerCase().includes(q)))
      .slice(0, 8);
    if (!matches.length) {
      resultsEl.innerHTML = '<div class="aig-result-empty">No matches.</div>';
    } else {
      resultsEl.innerHTML = matches.map(a =>
        `<div class="aig-result" data-id="${a.id}">
           <div class="aig-result-title">${escHtml(a.title || 'Untitled')}</div>
           <div class="aig-result-cat">${escHtml(DB.getCatPath(a.categoryId) || 'Uncategorized')}</div>
         </div>`
      ).join('');
    }
    resultsEl.style.display = 'block';
  };
  resultsEl.onclick = (e) => {
    const row = e.target.closest('.aig-result');
    if (!row) return;
    const id = row.getAttribute('data-id');
    if (id && !chips.includes(id)) chips.push(id);
    searchEl.value = '';
    resultsEl.style.display = 'none';
    renderChips();
  };

  async function runGenerate() {
    const title    = document.getElementById('aig-title').value.trim();
    const guidance = document.getElementById('aig-guidance').value.trim();
    const templateId = document.getElementById('aig-template').value || '';
    if (!title) { UI.toast('Please enter a title.'); return; }

    // Flip the modal into streaming-preview layout
    const form = document.querySelector('#modal-body .ai-gen-form');
    if (form) form.classList.add('ai-streaming');

    const progress  = document.getElementById('aig-progress');
    const phaseText = document.getElementById('aig-phase-text');
    const ctxWrap   = document.getElementById('aig-context');
    const streamWrap= document.getElementById('aig-stream-wrap');
    const streamEl  = document.getElementById('aig-stream-preview');
    const streamTit = document.getElementById('aig-stream-title-text');
    const streamSum = document.getElementById('aig-stream-summary');
    const streamCount = document.getElementById('aig-stream-count');

    progress.style.display = 'block';
    phaseText.textContent = 'Gathering context…';
    // Disable action buttons while running
    document.querySelectorAll('#modal-actions .btn').forEach(b => b.disabled = true);

    const fullSpec = { title, guidance, templateId, relatedIds: chips.slice() };
    const busyId = UI.aiBusyBegin('Generating: ' + (title || 'new article'));

    try {
      const draft = await AI.generateArticleStreaming(fullSpec, {
        onPhase: (phase) => {
          if (phase === 'context') phaseText.textContent = 'Gathering context…';
          else if (phase === 'writing') phaseText.textContent = 'Writing article…';
          else if (phase === 'parsing') phaseText.textContent = 'Parsing result…';
          else if (phase === 'done')    phaseText.textContent = 'Done.';
          if (phase === 'writing') UI.aiBusyUpdate(busyId, 'Streaming article…');
          if (phase === 'parsing') UI.aiBusyUpdate(busyId, 'Parsing result…');
        },
        onContextReady: (ctx) => {
          ctxWrap.innerHTML = renderCtxBlock(ctx);
          ctxWrap.style.display = 'block';
          // Reveal the preview pane as soon as context is done, ready for tokens.
          streamWrap.style.display = 'flex';
          streamEl.classList.add('active');
        },
        onTitle: (t) => {
          if (t) streamTit.textContent = t;
        },
        onSummary: (s) => {
          if (s) {
            streamSum.textContent = s;
            streamSum.style.display = 'block';
          }
        },
        onContentDelta: (htmlSoFar /*, deltaChars */) => {
          streamEl.classList.remove('empty');
          // Live HTML render; strict parse + sanitisation happens on completion.
          streamEl.innerHTML = htmlSoFar;
          streamCount.textContent = String(htmlSoFar.length);
          // Auto-scroll to bottom so the user follows the stream.
          streamEl.scrollTop = streamEl.scrollHeight;
        },
      });

      // Streaming done. Freeze the preview (no more caret).
      streamEl.classList.remove('active');
      phaseText.textContent = 'Saving draft…';

      // Stash in sessionStorage so the editor can pick it up
      const draftKey = 'eomt_ai_draft_' + Date.now().toString(36);
      try {
        sessionStorage.setItem(draftKey, JSON.stringify(draft));
      } catch (e) {
        UI.toast('Draft too large for sessionStorage.');
        document.querySelectorAll('#modal-actions .btn').forEach(b => b.disabled = false);
        progress.style.display = 'none';
        UI.aiBusyEnd(busyId);
        return;
      }
      UI.aiBusyEnd(busyId);
      UI.closeModal();
      location.href = 'editor.html?id=new&draftKey=' + encodeURIComponent(draftKey);
    } catch (e) {
      streamEl.classList.remove('active');
      const phaseLine = document.getElementById('aig-phase');
      if (phaseLine) phaseLine.classList.add('error');
      phaseText.textContent = 'Failed: ' + (e.message || e);
      // Re-enable so user can tweak and retry
      document.querySelectorAll('#modal-actions .btn').forEach(b => b.disabled = false);
      UI.aiBusyEnd(busyId);
    }
  }
}

// Renders the explicit + semantic context article chips inside a container.
function renderCtxBlock(ctx) {
  const ex = Array.isArray(ctx && ctx.explicit) ? ctx.explicit : [];
  const se = Array.isArray(ctx && ctx.semantic) ? ctx.semantic : [];
  if (!ex.length && !se.length) {
    return '<div class="ai-ctx-empty">No related articles found. The AI will write from scratch.</div>';
  }
  const chipHtml = (item, variant) => {
    const tip = (item.summary || item.snippet || item.title || '').slice(0, 400);
    const score = (variant === 'semantic' && typeof item.score === 'number')
      ? `<span class="ai-ctx-score">${(item.score * 100).toFixed(0)}%</span>`
      : '';
    return `<span class="ai-ctx-chip ${variant}" title="${escHtml(tip)}">${escHtml(item.title || 'Untitled')}${score}</span>`;
  };
  let out = '';
  if (ex.length) {
    out += `<div class="ai-ctx-heading">Explicitly referenced (${ex.length})</div>`;
    out += `<div class="ai-ctx-row">${ex.map(i => chipHtml(i, 'explicit')).join('')}</div>`;
  }
  if (se.length) {
    out += `<div class="ai-ctx-heading">Auto-retrieved (${se.length})</div>`;
    out += `<div class="ai-ctx-row">${se.map(i => chipHtml(i, 'semantic')).join('')}</div>`;
  }
  return out;
}

// Expose globally so the editor's "Regenerate" banner can call back into this flow
window.openAIGenerateModal = openAIGenerateModal;

function toggleWbSection(sid) {
  const tog  = document.getElementById(sid + '_tog');
  const rows = document.querySelectorAll(`[data-section="${sid}"]`);
  const isCollapsed = tog && tog.classList.contains('collapsed');
  if (tog) tog.classList.toggle('collapsed', !isCollapsed);
  rows.forEach(r => r.style.display = isCollapsed ? '' : 'none');
}

function buildTOC(contentEl) {
  const nav = document.getElementById('toc-nav');
  nav.innerHTML = '';
  const headings = contentEl.querySelectorAll('h1,h2,h3');
  const panel = document.getElementById('toc-panel');
  panel.style.display = headings.length >= 2 ? 'block' : 'none';
  headings.forEach((h, i) => {
    h.id = 'hd' + i;
    const a = document.createElement('a');
    a.className = `toc-item toc-${h.tagName.toLowerCase()}`;
    a.textContent = h.textContent;
    a.onclick = () => {
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
      document.querySelectorAll('.toc-item').forEach(e => e.classList.remove('active'));
      a.classList.add('active');
    };
    nav.appendChild(a);
  });
}

async function deleteArticle() {
  const params = new URLSearchParams(location.search);
  const artId = params.get('id');
  const art = DB.articles.find(a => a.id === artId);
  if (!confirm(`Delete "${art?.title || 'this article'}"? This cannot be undone.`)) return;
  await DB.deleteArticleFile(artId);
  DB.articles = DB.articles.filter(a => a.id !== artId);
  await DB.save();
  UI.toast('Article deleted.');
  location.href = 'index.html';
}
</script>
</body>
</html>
